<div id="quote-panel" class="p-4 border rounded-xl">
  <div class="flex items-center justify-between">
    <div class="font-semibold">Quote</div>
    <div class="text-sm px-3 py-1 border rounded-full">{{ quote.status }}</div>
  </div>

  <div class="mt-2">
    <div>Total: <span class="font-medium">{{ quote.amount_total }}</span> {{ quote.currency }}</div>
    <div class="text-sm opacity-70">Valid until: {{ quote.valid_until }}</div>
  </div>

  {% if quote.status == "SENT" %}
    <form
      class="mt-3"
      hx-post="{% url 'quote_accept' quote.pk %}"
      hx-target="#quote-panel"
      hx-swap="outerHTML"
    >
      {% csrf_token %}
      <button class="px-4 py-2 border rounded-lg" type="submit">Accept quote</button>
    </form>
  {% elif quote.status == "ACCEPTED" %}
    <div class="mt-3 text-sm opacity-70">Accepted at: {{ quote.accepted_at }}</div>
  {% endif %}
</div>
