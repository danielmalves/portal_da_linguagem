{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-16 p-6 border rounded-xl">
    <h1 class="text-2xl font-semibold mb-4">Login</h1>
    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="px-4 py-2 rounded-lg border" type="submit">Enter</button>
    </form>
  </div>
{% endblock %}
